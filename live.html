<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Chat App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #e5ddd5; display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 400px; height: 80vh; background: white; margin-top: 20px; display: flex; flex-direction: column; border-radius: 10px; box-shadow: 0px 5px 15px rgba(0,0,0,0.2); }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg-box { padding: 10px; border-radius: 8px; max-width: 80%; word-wrap: break-word; font-size: 14px; background: #eee; }
        .mine { background-color: #dcf8c6; align-self: flex-end; }
        .others { background-color: #fff; align-self: flex-start; border: 1px solid #ddd; }
        #input-area { display: flex; padding: 10px; background: #f0f0f0; border-top: 1px solid #ccc; }
        input { border: 1px solid #ddd; padding: 10px; border-radius: 5px; outline: none; flex: 1; }
        button { background: #075e54; color: white; border: none; padding: 10px; margin-left: 5px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Name" style="width: 60px; flex:none;">
            <input type="text" id="msg-input" placeholder="Type a message...">
            <button onclick="send()">Send</button>
        </div>
    </div>

    <script>
        // Connect to the server running on http://127.0.0.1:5000
        const socket = io(); 

        // LISTEN FOR OUTPUT: When server sends 'spit_back', show it on screen
        socket.on('spit_back', (data) => {
            const messagesDiv = document.getElementById('messages');
            const currentUser = document.getElementById('user-input').value || "Guest";

            const div = document.createElement('div');
            div.classList.add('msg-box');
            div.classList.add(data.user === currentUser ? 'mine' : 'others');

            div.innerHTML = `<strong>${data.user}:</strong> ${data.msg}`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight; // Auto-scroll
        });

        // SEND INPUT: Take text from box and send to Python
        function send() {
            const user = document.getElementById('user-input').value || "Guest";
            const msgInput = document.getElementById('msg-input');
            const message = msgInput.value;

            if (message.trim() !== "") {
                socket.emit('chat_message', { user: user, msg: message });
                msgInput.value = ""; 
            }
        }
    </script>
</body>
</html>
